openapi: 3.1.0
info:
  title: HeyClaude API
  version: 1.0.0
  description: Read-only registry, distribution feeds, and tightly scoped dynamic endpoints. Public
    registry publishing is not exposed through the API.
servers:
  - url: https://heyclau.de
  - url: https://dev.heyclau.de
security:
  - OriginCheck: []
components:
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: object
          properties:
            code:
              type: string
              minLength: 1
            message:
              type: string
            details: {}
          required:
            - code
        requestId:
          type: string
      required:
        - ok
        - error
    RegistryBrandAsset:
      type: object
      properties:
        brandName:
          type: string
        brandDomain:
          type: string
        brandIconUrl:
          type: string
        brandLogoUrl:
          type: string
        brandAssetSource:
          type: string
        brandVerifiedAt:
          type: string
        brandColors:
          type: array
          items:
            type: string
          maxItems: 6
    RegistrySearchResult:
      type: object
      properties:
        brandName:
          type: string
        brandDomain:
          type: string
        brandIconUrl:
          type: string
        brandLogoUrl:
          type: string
        brandAssetSource:
          type: string
        brandVerifiedAt:
          type: string
        brandColors:
          type: array
          items:
            type: string
          maxItems: 6
        submittedBy:
          type: string
        submittedByUrl:
          type: string
          format: uri
        submittedAt:
          type: string
        sourceSubmissionNumber:
          type: integer
          exclusiveMinimum: 0
        sourceSubmissionUrl:
          type: string
          format: uri
        importPrNumber:
          type: integer
          exclusiveMinimum: 0
        importPrUrl:
          type: string
          format: uri
        reviewedBy:
          type: string
        reviewedAt:
          type: string
        claimStatus:
          type: string
          enum:
            - unclaimed
            - pending
            - verified
        claimedBy:
          type: string
        claimedByUrl:
          type: string
          format: uri
        claimedAt:
          type: string
        category:
          type: string
        slug:
          type: string
        title:
          type: string
        seoTitle:
          type: string
        description:
          type: string
        seoDescription:
          type: string
        tags:
          type: array
          items:
            type: string
          maxItems: 32
        keywords:
          type: array
          items:
            type: string
          maxItems: 64
        author:
          type: string
        safetyNotes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 320
          maxItems: 8
        privacyNotes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 320
          maxItems: 8
        dateAdded:
          type: string
        installable:
          type: boolean
        downloadUrl:
          type: string
        downloadTrust:
          type:
            - string
            - "null"
        verificationStatus:
          type: string
        platforms:
          type: array
          items:
            type: string
          maxItems: 12
        supportLevels:
          type: array
          items:
            type: string
          maxItems: 12
        documentationUrl:
          type: string
        repoUrl:
          type: string
        url:
          type: string
        canonicalUrl:
          type: string
          format: uri
        llmsUrl:
          type: string
          format: uri
        apiUrl:
          type: string
          format: uri
        trustSignals:
          type: object
          properties:
            firstPartyEditorial:
              type: boolean
            packageVerified:
              type: boolean
            packageTrust:
              type:
                - string
                - "null"
            packageChecksum:
              type: string
            checksumPresent:
              type: boolean
            sourceUrlCount:
              type: integer
              minimum: 0
            sourceUrls:
              type: array
              items:
                type: string
                format: uri
              maxItems: 8
            sourceStatus:
              anyOf:
                - type: string
                  enum:
                    - available
                    - missing
                - type: string
            lastVerifiedAt:
              type: string
            adapterGenerated:
              type: boolean
            hasSafetyNotes:
              type: boolean
            hasPrivacyNotes:
              type: boolean
            platforms:
              type: array
              items:
                type: string
              maxItems: 12
            supportLevels:
              type: array
              items:
                type: string
              maxItems: 12
      required:
        - category
        - slug
        - title
        - description
        - tags
        - keywords
        - author
        - dateAdded
        - installable
        - verificationStatus
        - documentationUrl
        - repoUrl
        - url
        - canonicalUrl
        - llmsUrl
        - apiUrl
        - trustSignals
      additionalProperties: {}
    RegistryTrendingResponse:
      type: object
      properties:
        schemaVersion:
          type: number
        kind:
          type: string
          enum:
            - registry-trending
        category:
          type: string
        platform:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 50
        count:
          type: integer
          minimum: 0
        signalsAvailable:
          type: object
          properties:
            votes:
              type: boolean
            community:
              type: boolean
            intent:
              type: boolean
          required:
            - votes
            - community
            - intent
        entries:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              slug:
                type: string
              title:
                type: string
              description:
                type: string
              canonicalUrl:
                type: string
                format: uri
              platforms:
                type: array
                items:
                  type: string
                maxItems: 12
              tags:
                type: array
                items:
                  type: string
                maxItems: 32
              dateAdded:
                type: string
              score:
                type: number
              reasons:
                type: array
                items:
                  type: string
                maxItems: 6
              trustSignals:
                type: object
                properties:
                  sourceStatus:
                    type: string
                required:
                  - sourceStatus
            required:
              - category
              - slug
              - title
              - description
              - platforms
              - tags
              - dateAdded
              - score
              - reasons
              - trustSignals
          maxItems: 50
      required:
        - schemaVersion
        - kind
        - category
        - platform
        - limit
        - count
        - signalsAvailable
        - entries
    RegistryTrustSignals:
      type: object
      properties:
        firstPartyEditorial:
          type: boolean
        packageVerified:
          type: boolean
        packageTrust:
          type:
            - string
            - "null"
        packageChecksum:
          type: string
        checksumPresent:
          type: boolean
        sourceUrlCount:
          type: integer
          minimum: 0
        sourceUrls:
          type: array
          items:
            type: string
            format: uri
          maxItems: 8
        sourceStatus:
          anyOf:
            - type: string
              enum:
                - available
                - missing
            - type: string
        lastVerifiedAt:
          type: string
        adapterGenerated:
          type: boolean
        hasSafetyNotes:
          type: boolean
        hasPrivacyNotes:
          type: boolean
        platforms:
          type: array
          items:
            type: string
          maxItems: 12
        supportLevels:
          type: array
          items:
            type: string
          maxItems: 12
  parameters: {}
paths:
  /api/registry/manifest:
    get:
      tags:
        - Registry
      summary: Registry artifact manifest
      responses:
        "200":
          description: Cacheable registry response with ETag support where applicable.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
        "400":
          description: Invalid JSON, invalid query, invalid payload, or invalid status transition.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "401":
          description: Unauthorized admin token or invalid webhook signature.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "403":
          description: Forbidden origin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "413":
          description: Payload too large.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "415":
          description: Invalid content type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "429":
          description: Route-level or Cloudflare-native rate limited.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "500":
          description: Internal error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "502":
          description: Upstream provider error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "503":
          description: Site DB not configured, provider not configured, or endpoint unavailable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
  /api/registry/categories:
    get:
      tags:
        - Registry
      summary: Registry category summaries
      responses:
        "200":
          description: Cacheable registry response with ETag support where applicable.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
        "400":
          description: Invalid JSON, invalid query, invalid payload, or invalid status transition.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "401":
          description: Unauthorized admin token or invalid webhook signature.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "403":
          description: Forbidden origin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "413":
          description: Payload too large.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "415":
          description: Invalid content type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "429":
          description: Route-level or Cloudflare-native rate limited.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "500":
          description: Internal error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "502":
          description: Upstream provider error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
        "503":
          description: Site DB not configured, provider not configured, or endpoint unavailable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                  requestId:
                    type: string
                required:
                  - ok
                  - error
  /api/registry/search:
    get:
      tags:
        - Registry
      summary: Search registry entries
      description: Search entries by query, category, and platform while preserving bounded result size.
      parameters:
        - schema:
            type: string
            maxLength: 120
            default: ""
          required: false
          name: q
          in: query
        - schema:
            anyOf:
              - type: string
                pattern: ^[a-z0-9-]+$
              - type: string
                enum:
                  - ""
            default: ""
          required: false
          name: category
          in: query
        - schema:
            anyOf:
              - type: string
                pattern: ^[a-z0-9][a-z0-9 -]{0,48}$
              - type: string
                enum:
                  - ""
            default: ""
          required: false
          name: platform
          in: query
        - schema:
            type: string
            enum:
              - all
              - "true"
              - "false"
            default: all
          required: false
          name: hasSafetyNotes
          in: query
        - schema:
            type: string
            enum:
              - all
              - "true"
              - "false"
            default: all
          required: false
          name: hasPrivacyNotes
          in: query
        - schema:
            type: string
            enum:
              - all
              - first-party
              - external
              - none
            default: all
          required: false
          name: downloadTrust
          in: query
        - schema:
            type: string
            enum:
              - all
              - unclaimed
              - pending
              - verified
            default: all
          required: false
          name: claimStatus
          in: query
        - schema:
            type: string
            enum:
              - all
              - available
              - missing
            default: all
          required: false
          name: sourceStatus
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          required: false
          name: limit
          in: query
        - schema:
            type:
              - integer
              - "null"
            minimum: 0
            maximum: 10000
            default: 0
          required: false
          name: offset
          in: query
      responses:
        "200":
          description: Cacheable registry response with ETag support where applicable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemaVersion:
                    type: number
                  query:
                    type: string
                  category:
                    type: string
                  platform:
                    type: string
                  filters:
                    type: object
                    properties:
                      hasSafetyNotes:
                        type: string
                      hasPrivacyNotes:
                        type: string
                      downloadTrust:
                        type: string
                      claimStatus:
                        type: string
                      sourceStatus:
                        type: string
                    required:
                      - hasSafetyNotes
                      - hasPrivacyNotes
                      - downloadTrust
                      - claimStatus
                      - sourceStatus
                  count:
                    type: integer
                    minimum: 0
                  total:
                    type: integer
                    minimum: 0
                  limit:
                    type: integer
                    minimum: 1
                    maximum: 50
                  offset:
                    type: integer
                    minimum: 0
                    maximum: 10000
                  nextOffset:
                    type:
                      - integer
                      - "null"
                    minimum: 0
                    maximum: 10000
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        brandName:
                          type: string
                        brandDomain:
                          type: string
                        brandIconUrl:
                          type: string
                        brandLogoUrl:
                          type: string
                        brandAssetSource:
                          type: string
                        brandVerifiedAt:
                          type: string
                        brandColors:
                          type: array
                          items:
                            type: string
                          maxItems: 6
                        submittedBy:
                          type: string
                        submittedByUrl:
                          type: string
                          format: uri
                        submittedAt:
                          type: string
                        sourceSubmissionNumber:
                          type: integer
                          exclusiveMinimum: 0
                        sourceSubmissionUrl:
                          type: string
                          format: uri
                        importPrNumber:
                          type: integer
                          exclusiveMinimum: 0
                        importPrUrl:
                          type: string
                          format: uri
                        reviewedBy:
                          type: string
                        reviewedAt:
                          type: string
                        claimStatus:
                          type: string
                          enum:
                            - unclaimed
                            - pending
                            - verified
                        claimedBy:
                          type: string
                        claimedByUrl:
                          type: string
                          format: uri
                        claimedAt:
                          type: string
                        category:
                          type: string
                        slug:
                          type: string
                        title:
                          type: string
                        seoTitle:
                          type: string
                        description:
                          type: string
                        seoDescription:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                          maxItems: 32
                        keywords:
                          type: array
                          items:
                            type: string
                          maxItems: 64
                        author:
                          type: string
                        safetyNotes:
                          type: array
                          items:
                            type: string
                            minLength: 1
                            maxLength: 320
                          maxItems: 8
                        privacyNotes:
                          type: array
                          items:
                            type: string
                            minLength: 1
                            maxLength: 320
                          maxItems: 8
                        dateAdded:
                          type: string
                        installable:
                          type: boolean
                        downloadUrl:
                          type: string
                        downloadTrust:
                          type:
                            - string
                            - "null"
                        verificationStatus:
                          type: string
                        platforms:
                          type: array
                          items:
                            type: string
                          maxItems: 12
                        supportLevels:
                          type: array
                          items:
                            type: string
                          maxItems: 12
                        documentationUrl:
                          type: string
                        repoUrl:
                          type: string
                        url:
                          type: string
                        canonicalUrl:
                          type: string
                          format: uri
                        llmsUrl:
                          type: string
                          format: uri
                        apiUrl:
                          type: string
                          format: uri
                        trustSignals:
                          type: object
                          properties:
                            firstPartyEditorial:
                              type: boolean
                            packageVerified:
                              type: boolean
                            packageTrust:
                              type:
                                - string
                                - "null"
                            packageChecksum:
                              type: string
                            checksumPresent:
                              type: boolean
                            sourceUrlCount:
                              type: integer
                              minimum: 0
                            sourceUrls:
                              type: array
                              items:
                                type: string
                                format: uri
                              maxItems: 8
                            sourceStatus:
                              anyOf:
                                - type: string
                                  enum:
                                    - available
                                    - missing
                                - type: string
                            lastVerifiedAt:
                              type: string
                            adapterGenerated:
                              type: boolean
                            hasSafetyNotes:
                              type: boolean
                            hasPrivacyNotes:
                              type: boolean
                            platforms:
                              type: array
                              items:
                                type: string
                              maxItems: 12
                            supportLevels:
                              type: array
                              items:
                                type: string
                              maxItems: 12
                      required:
                        - category
                        - slug
                        - title
                        - description
                        - tags
                        - keywords
                        - author
                        - dateAdded
                        - installable
                        - verificationStatus
                        - documentationUrl
                        - repoUrl
                        - url
                        - canonicalUrl
                        - llmsUrl
                        - apiUrl
                        - trustSignals
                      additionalProperties: {}
                    maxItems: 50
                  facets:
                    type: object
                    properties:
                      categories:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      platforms:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      hasSafetyNotes:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      hasPrivacyNotes:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      downloadTrust:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      claimStatus:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                      sourceStatus:
                        type: object
                        additionalProperties:
                          type: integer
                          minimum: 0
                    required:
                      - categories
                      - platforms
                      - hasSafetyNotes
                      - hasPrivacyNotes
                      - downloadTrust
                      - claimStatus
                      - sourceStatus
                required:
                  - schemaVersion
                  - query
                  - category
                  - platform
                  - count
                  - total
                  - limit
                  - offset
                  - nextOffset
