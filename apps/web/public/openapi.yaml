                  - free
                  - standard
                  - featured
                  - sponsored
              - type: string
                enum:
                  - all
              - type: string
                enum:
                  - ""
            default: all
          required: false
          name: tier
          in: query
        - schema:
            type: string
            enum:
              - all
              - "true"
              - "false"
              - ""
            default: all
          required: false
          name: remote
          in: query
        - schema:
            type: string
            maxLength: 120
            default: ""
          required: false
          name: location
          in: query
        - schema:
            type: string
            maxLength: 60
            default: ""
          required: false
          name: type
          in: query
        - schema:
            type: string
            enum:
              - all
              - official_ats
              - employer_careers
              - employer_submitted
