  /api/registry/search:
    get:
      tags:
        - Registry
      summary: Search registry entries
      description: Search entries by query, category, and platform while preserving bounded result size.
      parameters:
        - schema:
            type: string
            maxLength: 120
            default: ""
          required: false
          name: q
          in: query
        - schema:
            type: string
            pattern: ^[a-z0-9-]+$
            default: ""
          required: false
          name: category
          in: query
        - schema:
            type: string
            pattern: ^[a-z0-9][a-z0-9 -]{0,48}$
            default: ""
          required: false
          name: platform
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Cacheable registry response with ETag support where applicable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemaVersion:
                    type: number
                  query:
                    type: string
                  category:
                    type: string
                  platform:
                    type: string
