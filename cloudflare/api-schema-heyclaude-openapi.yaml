openapi: 3.1.0
info:
  title: HeyClaude API
  version: 1.0.0
  description:
    Read-only registry, distribution feeds, and tightly scoped dynamic endpoints. Public
    registry publishing is not exposed through the API.
servers:
  - url: https://heyclau.de
  - url: https://dev.heyclau.de
security:
  - OriginCheck: []
components:
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: object
          properties:
            code:
              type: string
              minLength: 1
            message:
              type: string
            details: {}
          required:
            - code
        requestId:
          type: string
      required:
        - ok
        - error
    RegistryBrandAsset:
      type: object
      properties:
        brandName:
          type: string
        brandDomain:
          type: string
        brandIconUrl:
          type: string
        brandLogoUrl:
          type: string
        brandAssetSource:
          type: string
        brandVerifiedAt:
          type: string
        brandColors:
          type: array
          items:
            type: string
          maxItems: 6
    RegistrySearchResult:
      type: object
      properties:
        brandName:
          type: string
        brandDomain:
          type: string
        brandIconUrl:
          type: string
        brandLogoUrl:
          type: string
        brandAssetSource:
          type: string
        brandVerifiedAt:
          type: string
        brandColors:
          type: array
          items:
            type: string
          maxItems: 6
        submittedBy:
          type: string
        submittedByUrl:
          type: string
          format: uri
        submittedAt:
          type: string
        submissionIssueNumber:
          type: integer
          exclusiveMinimum: 0
        submissionIssueUrl:
          type: string
          format: uri
        importPrNumber:
          type: integer
          exclusiveMinimum: 0
        importPrUrl:
          type: string
          format: uri
        reviewedBy:
          type: string
        reviewedAt:
          type: string
        claimStatus:
          type: string
          enum:
            - unclaimed
            - pending
            - verified
        claimedBy:
          type: string
        claimedByUrl:
          type: string
          format: uri
        claimedAt:
          type: string
        category:
          type: string
        slug:
          type: string
        title:
          type: string
        seoTitle:
          type: string
        description:
          type: string
        seoDescription:
          type: string
        tags:
          type: array
          items:
            type: string
          maxItems: 32
        keywords:
          type: array
          items:
            type: string
          maxItems: 64
        author:
          type: string
        dateAdded:
          type: string
        installable:
          type: boolean
        downloadTrust:
          type:
            - string
            - "null"
        verificationStatus:
          type: string
        platforms:
          type: array
          items:
            type: string
          maxItems: 12
        supportLevels:
          type: array
          items:
            type: string
          maxItems: 12
        documentationUrl:
          type: string
        repoUrl:
          type: string
        url:
          type: string
        canonicalUrl:
          type: string
          format: uri
        llmsUrl:
          type: string
          format: uri
        apiUrl:
          type: string
          format: uri
        trustSignals:
          type: object
          properties:
            firstPartyEditorial:
              type: boolean
            packageVerified:
              type: boolean
            packageTrust:
              type:
                - string
                - "null"
            packageChecksum:
              type: string
            checksumPresent:
              type: boolean
            sourceUrlCount:
              type: integer
              minimum: 0
            sourceUrls:
              type: array
              items:
                type: string
                format: uri
              maxItems: 8
            sourceStatus:
              anyOf:
                - type: string
                  enum:
                    - available
                    - missing
                - type: string
            lastVerifiedAt:
              type: string
            adapterGenerated:
              type: boolean
            platforms:
              type: array
              items:
                type: string
              maxItems: 12
            supportLevels:
              type: array
              items:
                type: string
              maxItems: 12
      required:
        - category
        - slug
        - title
        - description
        - tags
        - keywords
        - author
        - dateAdded
        - installable
        - verificationStatus
        - documentationUrl
        - repoUrl
        - url
        - canonicalUrl
        - llmsUrl
        - apiUrl
        - trustSignals
      additionalProperties: {}
    RegistryTrustSignals:
      type: object
      properties:
        firstPartyEditorial:
          type: boolean
        packageVerified:
          type: boolean
        packageTrust:
          type:
            - string
            - "null"
        packageChecksum:
          type: string
        checksumPresent:
          type: boolean
        sourceUrlCount:
          type: integer
          minimum: 0
        sourceUrls:
          type: array
          items:
            type: string
            format: uri
          maxItems: 8
        sourceStatus:
          anyOf:
            - type: string
              enum:
                - available
                - missing
            - type: string
        lastVerifiedAt:
          type: string
        adapterGenerated:
          type: boolean
        platforms:
          type: array
          items:
            type: string
          maxItems: 12
        supportLevels:
          type: array
          items:
            type: string
          maxItems: 12
  parameters: {}
