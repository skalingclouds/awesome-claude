name: Tag And Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    concurrency:
      group: tag-release-from-main-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Parse version from commit message
        id: version
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          raw=""
          if [ -n "${COMMIT_MSG:-}" ]; then
            msg="${COMMIT_MSG:-}"
            raw="$(printf '%s' "$msg" | sed -E 's/^chore\(release\):[[:space:]]*//')"
            raw="$(printf '%s' "$raw" | tr -d '[:space:]')"
          fi
          if [ -z "$raw" ]; then
            latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [ -z "$latest" ]; then
              raw="0.1.0"
            else
              version="${latest#v}"
              IFS=. read -r major minor patch <<< "$version"
              raw="${major}.${minor}.$((patch + 1))"
            fi
          fi
          if [[ "$raw" == v* ]]; then
            tag="$raw"
          else
            tag="v$raw"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $raw"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping."
            exit 0
          fi
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Setup pnpm
        if: ${{ vars.INDEXNOW_SUBMIT == '1' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ vars.INDEXNOW_SUBMIT == '1' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ vars.INDEXNOW_SUBMIT == '1' }}
        run: pnpm install --frozen-lockfile

      - name: Submit production URLs to IndexNow
        if: ${{ vars.INDEXNOW_SUBMIT == '1' }}
        continue-on-error: true
        env:
          INDEXNOW_SUBMIT: "1"
          INDEXNOW_BASE_URL: https://heyclau.de
        run: pnpm indexnow:submit
