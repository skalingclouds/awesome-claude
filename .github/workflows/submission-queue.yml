name: Submission Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "41 10 * * 1"

permissions:
  contents: read
  issues: read

jobs:
  build-submission-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch open issues
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            fs.mkdirSync(".github/tmp", { recursive: true });
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: "open",
              per_page: 100
            });
            const userIssues = issues.filter((issue) => !issue.pull_request);
            fs.writeFileSync(
              ".github/tmp/open-issues.json",
              JSON.stringify(userIssues, null, 2),
              "utf8"
            );

      - name: Build queue
        run: |
          pnpm run submission:queue -- \
            --issues-json .github/tmp/open-issues.json \
            --output .github/tmp/submission-queue.json

      - name: Validate queue artifact
        run: test -s .github/tmp/submission-queue.json

      - name: Write queue summary
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const queue = JSON.parse(fs.readFileSync(".github/tmp/submission-queue.json", "utf8"));
          const lines = [
            "# Submission Queue",
            "",
            `- Import ready: ${queue.summary.importReady}`,
            `- Needs author input: ${queue.summary.needsAuthorInput}`,
            `- Source needs verification: ${queue.summary.sourceNeedsVerification}`,
            `- Stale reminder due: ${queue.summary.staleReminderDue}`,
            `- Close eligible: ${queue.summary.closeEligible}`,
            `- Skipped: ${queue.summary.skipped}`,
            "",
            "| Issue | Status | Security | Policy | Source | Contributor | Age | Category | Slug | Action | Notes |",
            "| --- | --- | --- | --- | --- | --- | ---: | --- | --- | --- | --- |",
          ];
          const cell = (value) => String(value || "-").replace(/\|/g, "\\|").replace(/\r?\n/g, "<br>");
          for (const entry of queue.entries) {
            const issue = entry.url ? `[#${entry.number}](${entry.url})` : `#${entry.number}`;
            const notes = entry.maintainerActions?.length
              ? entry.maintainerActions.slice(0, 3).join("<br>")
              : entry.errors.length
                ? entry.errors.join("<br>")
                : entry.importPath;
            const riskTier = entry.riskTier || "-";
            const risk = entry.riskSummary || (entry.riskFlags?.length
              ? `${riskTier} (${entry.riskFlags.join(", ")})`
              : riskTier);
            const contributor = entry.contributorReview?.length
              ? entry.contributorReview.join(", ")
              : "-";
            lines.push(`| ${issue} | ${cell(entry.status)} | ${cell(risk)} | ${cell(entry.policyDecision)} | ${cell(entry.sourceState)} | ${cell(contributor)} | ${entry.ageDays ?? 0}d | ${cell(entry.category)} | ${cell(entry.slug)} | ${cell(entry.actionDue)} | ${cell(notes)} |`);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          NODE
