name: Package Artifact Scan

on:
  pull_request:
    paths:
      - "content/skills/*.zip"
      - "content/skills/**/*.zip"
      - "content/mcp/*.mcpb"
      - "content/mcp/**/*.mcpb"
      - "scripts/scan-download-packages.mjs"
      - "scripts/validate-download-packages.mjs"
      - ".github/workflows/package-artifact-scan.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package metadata
        run: pnpm validate:packages

      - name: Scan package artifacts
        run: pnpm scan:packages
