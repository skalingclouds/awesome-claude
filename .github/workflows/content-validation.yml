name: PR Validation

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read
  checks: write
  deployments: read

jobs:
  classify-pr:
    name: classify-pr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      direct_submission: ${{ steps.classify.outputs.direct_submission }}
      source_content_only: ${{ steps.classify.outputs.source_content_only }}
      readme_only: ${{ steps.classify.outputs.readme_only }}
      content: ${{ steps.classify.outputs.content }}
      content_config: ${{ steps.classify.outputs.content_config }}
      content_categories_json: ${{ steps.classify.outputs.content_categories_json }}
      registry: ${{ steps.classify.outputs.registry }}
      web: ${{ steps.classify.outputs.web }}
      mcp: ${{ steps.classify.outputs.mcp }}
      raycast: ${{ steps.classify.outputs.raycast }}
      packages: ${{ steps.classify.outputs.packages }}
      submission_gate: ${{ steps.classify.outputs.submission_gate }}
      ci: ${{ steps.classify.outputs.ci }}
      docs: ${{ steps.classify.outputs.docs }}
      full: ${{ steps.classify.outputs.full }}
      changed_files_json: ${{ steps.classify.outputs.changed_files_json }}
    concurrency:
      group: pr-classify-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          FORCE_FULL_VALIDATION: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref_name != 'automation/readme-refresh')) && '1' || '0' }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        run: |
          set -euo pipefail
          classifier_path="scripts/ci/classify-pr-changes.mjs"

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            trusted_classifier="${RUNNER_TEMP:-.}/classify-pr-changes.mjs"
            git show "$BASE_SHA:$classifier_path" > "$trusted_classifier"
            node "$trusted_classifier"
          else
            node "$classifier_path"
          fi

          if ! grep -q '^direct_submission=' "$GITHUB_OUTPUT"; then
            echo "direct_submission=false" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^source_content_only=' "$GITHUB_OUTPUT"; then
            echo "source_content_only=false" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^readme_only=' "$GITHUB_OUTPUT"; then
            echo "readme_only=false" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^content_config=' "$GITHUB_OUTPUT"; then
            echo "content_config=false" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^content_categories_json=' "$GITHUB_OUTPUT"; then
            echo "content_categories_json=[]" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^changed_files_json=' "$GITHUB_OUTPUT"; then
            echo "changed_files_json=[]" >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^submission_gate=' "$GITHUB_OUTPUT"; then
            if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ] && git diff --name-only "$BASE_SHA"...HEAD | grep -Eq '^(apps/submission-gate/.*|tests/submission-gate-.*|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$)'; then
              echo "submission_gate=true" >> "$GITHUB_OUTPUT"
            else
              echo "submission_gate=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  validate-ci:
    name: validate-ci
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged CI lane
        if: ${{ needs.classify-pr.outputs.ci != 'true' }}
        run: echo "No CI/config validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Validate cleanup policy
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        run: pnpm validate:clean

      - name: Validate task tracker
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        run: pnpm validate:tasks

      - name: Check whitespace
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        run: git diff --check

      - name: Install Trunk CLI
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        run: |
          curl https://get.trunk.io -fsSL | bash -s -- -y
          echo "$HOME/.trunk/bin" >> "$GITHUB_PATH"

      - name: Trunk Check
        if: ${{ needs.classify-pr.outputs.ci == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            trunk check --ci --upstream "$BASE_SHA"
          else
            trunk check --ci --all
          fi

  validate-worktree:
    name: validate-worktree
    needs: classify-pr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-worktree-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            git diff --check "$BASE_SHA"...HEAD
          else
            git diff --check
          fi

  validate-content-category:
    name: validate-content-${{ matrix.category }}
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.content_categories_json != '[]' && needs.classify-pr.outputs.direct_submission != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJson(needs.classify-pr.outputs.content_categories_json) }}
    concurrency:
      group: pr-validate-content-${{ matrix.category }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate ${{ matrix.category }} content schema
        run: pnpm validate:content:strict -- --category "${{ matrix.category }}"

      - name: Audit ${{ matrix.category }} content report
        run: pnpm audit:content -- --category "${{ matrix.category }}"

  validate-content-policy:
    name: validate-content-policy
    needs: classify-pr
    if: ${{ github.event_name == 'pull_request' && needs.classify-pr.outputs.direct_submission != 'true' && (needs.classify-pr.outputs.content == 'true' || needs.classify-pr.outputs.registry == 'true' || needs.classify-pr.outputs.packages == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-content-policy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0

      - name: Validate direct content policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          CHANGED_FILES_JSON: ${{ needs.classify-pr.outputs.changed_files_json }}
        run: |
          set -euo pipefail
          policy_path="scripts/ci/validate-content-policy.mjs"
          runtime_manifest_path="scripts/ci/content-policy-runtime/package.json"
          runtime_lock_path="scripts/ci/content-policy-runtime/package-lock.json"
          trusted_policy_dir="${RUNNER_TEMP:-.}/trusted-content-policy"
          trusted_policy="$trusted_policy_dir/validate-content-policy.mjs"
          changed_files_json_path="$trusted_policy_dir/changed-files.json"
          rm -rf "$trusted_policy_dir"
          mkdir -p "$trusted_policy_dir"
          printf '%s\n' "${CHANGED_FILES_JSON:-[]}" > "$changed_files_json_path"

          if git cat-file -e "$BASE_SHA:$runtime_manifest_path" 2>/dev/null && git cat-file -e "$BASE_SHA:$runtime_lock_path" 2>/dev/null; then
            git show "$BASE_SHA:$runtime_manifest_path" > "$trusted_policy_dir/package.json"
            git show "$BASE_SHA:$runtime_lock_path" > "$trusted_policy_dir/package-lock.json"
          else
            echo "::error::Trusted content policy runtime lockfile is missing from the base branch."
            exit 1
          fi

          (cd "$trusted_policy_dir" && npm ci --ignore-scripts --no-audit --no-fund)

          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            cp "$policy_path" "$trusted_policy"
          elif git cat-file -e "$BASE_SHA:$policy_path" 2>/dev/null; then
            git show "$BASE_SHA:$policy_path" > "$trusted_policy"
          else
            echo "::error::Trusted content policy script is missing from the base branch."
            exit 1
          fi

          node "$trusted_policy" --repo-root "$GITHUB_WORKSPACE" --files-json "$changed_files_json_path"

  validate-submission-source:
    name: validate-submission-source
    needs: classify-pr
    if: ${{ github.event_name == 'pull_request' && needs.classify-pr.outputs.direct_submission == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-submission-source-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate submitted source content
        env:
          CONTENT_CATEGORIES_JSON: ${{ needs.classify-pr.outputs.content_categories_json }}
        run: |
          set -euo pipefail
          category="$(node -e 'const categories = JSON.parse(process.env.CONTENT_CATEGORIES_JSON || "[]"); if (categories.length !== 1) process.exit(1); process.stdout.write(categories[0]);')"
          pnpm validate:content:strict -- --category "$category"
          pnpm audit:content -- --category "$category"

      - name: Validate submitted source policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          CHANGED_FILES_JSON: ${{ needs.classify-pr.outputs.changed_files_json }}
        run: |
          set -euo pipefail
          policy_path="scripts/ci/validate-content-policy.mjs"
          runtime_manifest_path="scripts/ci/content-policy-runtime/package.json"
          runtime_lock_path="scripts/ci/content-policy-runtime/package-lock.json"
          trusted_policy_dir="${RUNNER_TEMP:-.}/trusted-content-policy"
          trusted_policy="$trusted_policy_dir/validate-content-policy.mjs"
          changed_files_json_path="$trusted_policy_dir/changed-files.json"
          rm -rf "$trusted_policy_dir"
          mkdir -p "$trusted_policy_dir"
          printf '%s\n' "${CHANGED_FILES_JSON:-[]}" > "$changed_files_json_path"

          if git cat-file -e "$BASE_SHA:$runtime_manifest_path" 2>/dev/null && git cat-file -e "$BASE_SHA:$runtime_lock_path" 2>/dev/null; then
            git show "$BASE_SHA:$runtime_manifest_path" > "$trusted_policy_dir/package.json"
            git show "$BASE_SHA:$runtime_lock_path" > "$trusted_policy_dir/package-lock.json"
          else
            echo "::error::Trusted content policy runtime lockfile is missing from the base branch."
            exit 1
          fi

          (cd "$trusted_policy_dir" && npm ci --ignore-scripts --no-audit --no-fund)

          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            cp "$policy_path" "$trusted_policy"
          elif git cat-file -e "$BASE_SHA:$policy_path" 2>/dev/null; then
            git show "$BASE_SHA:$policy_path" > "$trusted_policy"
          else
            echo "::error::Trusted content policy script is missing from the base branch."
            exit 1
          fi

          node "$trusted_policy" --repo-root "$GITHUB_WORKSPACE" --files-json "$changed_files_json_path"

      - name: Check submitted source whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --check "$BASE_SHA"...HEAD

  validate-content-config:
    name: validate-content-config
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.content_config == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-content-config-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content schema
        run: pnpm validate:content:strict

      - name: Validate category submission spec
        run: pnpm validate:category-spec

      - name: Audit content report
        run: pnpm audit:content

  validate-content:
    name: validate-content
    needs:
      - classify-pr
      - validate-content-category
      - validate-content-policy
      - validate-submission-source
      - validate-content-config
    if: ${{ always() && needs.classify-pr.outputs.content == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-content-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Summarize content validation
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON || "{}");
          const rows = Object.entries(needs);

          console.log("Content validation results:");
          for (const [name, info] of rows) {
            console.log(`- ${name}: ${info.result || "unknown"}`);
          }

          const failed = rows.filter(([, info]) => {
            const result = info.result || "unknown";
            return !["success", "skipped"].includes(result);
          });

          if (failed.length > 0) {
            console.error("Content validation failed:");
            for (const [name, info] of failed) {
              console.error(`- ${name}: ${info.result || "unknown"}`);
            }
            process.exit(1);
          }
          NODE

  validate-registry:
    name: validate-registry
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.registry == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-registry-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged registry lane
        if: ${{ needs.classify-pr.outputs.registry != 'true' }}
        run: echo "No registry artifact validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build registry artifacts
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        run: pnpm --filter web run prebuild

      - name: Test registry artifact contracts
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        run: pnpm test:registry-artifacts

      - name: Generate README for source-only import validation
        if: ${{ needs.classify-pr.outputs.registry == 'true' && needs.classify-pr.outputs.source_content_only == 'true' }}
        run: pnpm generate:readme

      - name: Validate generated README
        if: ${{ needs.classify-pr.outputs.registry == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          EVENT_NAME: ${{ github.event_name }}
          README_ONLY: ${{ needs.classify-pr.outputs.readme_only }}
        run: |
          set -euo pipefail
          if [ "$README_ONLY" = "true" ]; then
            pnpm validate:readme
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ] && git diff --name-only "$BASE_SHA"...HEAD | grep -qx 'README.md'; then
            pnpm validate:readme
            exit 0
          fi

          echo "Skipping tracked README freshness check; README refresh is handled by the single automation/readme-refresh accumulator PR."

      - name: Verify generated registry artifacts remain build outputs
        if: ${{ needs.classify-pr.outputs.registry == 'true' && needs.classify-pr.outputs.source_content_only != 'true' && needs.classify-pr.outputs.readme_only != 'true' }}
        run: |
          set -euo pipefail
          # Registry/code changes can affect generated projections. They are
          # built and contract-tested above, but normal PRs should not commit
          # generated data churn unless they are explicit maintainer sync PRs.
          git checkout -- pnpm-lock.yaml

          dirty_files="$(git diff --name-only)"
          if [ -z "$dirty_files" ]; then
            echo "Generated registry artifacts are already current."
            exit 0
          fi

          disallowed="$(
            printf '%s\n' "$dirty_files" | grep -Ev '^(apps/web/public/data/.*|apps/web/src/generated/.*|apps/web/src/routeTree\.gen\.ts)$' || true
          )"
          if [ -n "$disallowed" ]; then
            echo "::error::Registry generation changed non-generated files:"
            printf '%s\n' "$disallowed"
            exit 1
          fi

          echo "Generated artifact changes are build-time outputs for this registry change:"
          printf '%s\n' "$dirty_files"

      - name: Verify README-only refresh leaves generated artifacts as build outputs
        if: ${{ needs.classify-pr.outputs.registry == 'true' && needs.classify-pr.outputs.readme_only == 'true' }}
        run: |
          set -euo pipefail
          # README refresh PRs intentionally commit README.md only. Registry,
          # LLM, Raycast, manifest, and generated source projections are built
          # and contract-tested above, but stay deploy/build artifacts.
          git checkout -- pnpm-lock.yaml

          dirty_files="$(git diff --name-only)"
          if [ -z "$dirty_files" ]; then
            echo "No generated artifact drift after README validation."
            exit 0
          fi

          disallowed="$(
            printf '%s\n' "$dirty_files" | grep -Ev '^(apps/web/public/data/.*|apps/web/src/generated/.*|apps/web/src/routeTree\.gen\.ts)$' || true
          )"
          if [ -n "$disallowed" ]; then
            echo "::error::README refresh generation changed non-generated files:"
            printf '%s\n' "$disallowed"
            exit 1
          fi

          echo "Generated artifact changes are build-time outputs for this README refresh:"
          printf '%s\n' "$dirty_files"

      - name: Verify source-only imports produce only build artifacts
        if: ${{ needs.classify-pr.outputs.registry == 'true' && needs.classify-pr.outputs.source_content_only == 'true' }}
        run: |
          set -euo pipefail
          # Hosted pnpm installs can normalize lockfile metadata. Source-only
          # import validation cares about generator side effects after install.
          git checkout -- pnpm-lock.yaml

          dirty_files="$(git diff --name-only)"
          if [ -z "$dirty_files" ]; then
            echo "Generated registry artifacts are already current."
            exit 0
          fi

          disallowed="$(
            printf '%s\n' "$dirty_files" | grep -Ev '^(README\.md|apps/web/public/data/.*|apps/web/src/generated/.*|apps/web/src/routeTree\.gen\.ts)$' || true
          )"
          if [ -n "$disallowed" ]; then
            echo "::error::Content import generation changed non-generated files:"
            printf '%s\n' "$disallowed"
            exit 1
          fi

          echo "Generated artifact changes are build-time outputs for this source-only content import:"
          printf '%s\n' "$dirty_files"

  validate-web:
    name: validate-web
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN || secrets.TRUNK_TOKEN }}
      TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG || secrets.TRUNK_ORG_SLUG }}
    concurrency:
      group: pr-validate-web-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged web lane
        if: ${{ needs.classify-pr.outputs.web != 'true' }}
        run: echo "No web/API validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Clean test reports
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: rm -rf reports/junit && mkdir -p reports/junit

      - name: Build registry artifacts
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm --filter web run prebuild

      - name: Generate README for source-only import validation
        if: ${{ needs.classify-pr.outputs.web == 'true' && needs.classify-pr.outputs.source_content_only == 'true' }}
        run: pnpm generate:readme

      - name: Apply local D1 migrations
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm --filter web db:migrate:local

      - name: Validate local D1 jobs schema
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm validate:d1-jobs -- --local

      - name: Validate generated OpenAPI schema
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm validate:openapi

      - name: Run Vitest suite
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm test

      - name: Install Trunk CLI
        if: ${{ needs.classify-pr.outputs.web == 'true' && env.TRUNK_API_TOKEN != '' && env.TRUNK_ORG_URL_SLUG != '' }}
        run: |
          curl https://get.trunk.io -fsSL | bash -s -- -y
          echo "$HOME/.trunk/bin" >> "$GITHUB_PATH"

      - name: Upload test results to Trunk
        if: ${{ needs.classify-pr.outputs.web == 'true' && always() && env.TRUNK_API_TOKEN != '' && env.TRUNK_ORG_URL_SLUG != '' }}
        continue-on-error: true
        run: trunk flakytests upload --junit-paths "reports/junit/*.xml" --org-url-slug "$TRUNK_ORG_URL_SLUG" --token "$TRUNK_API_TOKEN"

      - name: Type-check web app
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm type-check

      - name: Build web app
        if: ${{ needs.classify-pr.outputs.web == 'true' }}
        run: pnpm build

  validate-mcp:
    name: validate-mcp
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-mcp-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged MCP lane
        if: ${{ needs.classify-pr.outputs.mcp != 'true' }}
        run: echo "No MCP validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build registry artifacts
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        run: pnpm --filter web run prebuild

      - name: Test MCP package
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        run: pnpm test:mcp

      - name: Validate dev MCP endpoint
        if: ${{ needs.classify-pr.outputs.mcp == 'true' && github.event_name != 'pull_request' }}
        run: pnpm validate:mcp-endpoint -- --url https://heyclau.de/api/mcp

      - name: Dry-run MCP package tarball
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        run: pnpm --filter @heyclaude/mcp pack --dry-run --json

      - name: Validate packed MCP package
        if: ${{ needs.classify-pr.outputs.mcp == 'true' }}
        env:
          MCP_PACKAGE_REMOTE_SMOKE_URL: ${{ github.event_name != 'pull_request' && 'https://heyclau.de/api/mcp' || '' }}
        run: pnpm validate:mcp-package

  validate-raycast:
    name: validate-raycast
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN || secrets.TRUNK_TOKEN }}
      TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG || secrets.TRUNK_ORG_SLUG }}
    concurrency:
      group: pr-validate-raycast-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged Raycast lane
        if: ${{ needs.classify-pr.outputs.raycast != 'true' }}
        run: echo "No Raycast validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build feed artifacts
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        run: pnpm --filter web run prebuild

      - name: Clean test reports
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        run: rm -rf reports/junit && mkdir -p reports/junit

      - name: Validate Raycast feed
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        run: pnpm validate:raycast-feed

      - name: Test registry artifact contracts
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        run: pnpm test:registry-artifacts

      - name: Install Raycast dependencies
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        working-directory: integrations/raycast
        run: npm ci

      - name: Test Raycast helpers
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        working-directory: integrations/raycast
        run: npm run test:junit

      - name: Install Trunk CLI
        if: ${{ needs.classify-pr.outputs.raycast == 'true' && env.TRUNK_API_TOKEN != '' && env.TRUNK_ORG_URL_SLUG != '' }}
        run: |
          curl https://get.trunk.io -fsSL | bash -s -- -y
          echo "$HOME/.trunk/bin" >> "$GITHUB_PATH"

      - name: Upload Raycast test results to Trunk
        if: ${{ needs.classify-pr.outputs.raycast == 'true' && always() && env.TRUNK_API_TOKEN != '' && env.TRUNK_ORG_URL_SLUG != '' }}
        continue-on-error: true
        run: trunk flakytests upload --junit-paths "reports/junit/raycast.xml" --org-url-slug "$TRUNK_ORG_URL_SLUG" --token "$TRUNK_API_TOKEN"

      - name: Lint Raycast extension
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        working-directory: integrations/raycast
        run: npm run lint

      - name: Build Raycast extension
        if: ${{ needs.classify-pr.outputs.raycast == 'true' }}
        working-directory: integrations/raycast
        run: npm run build

  validate-packages:
    name: validate-packages
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.packages == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-validate-packages-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip unchanged package artifact lane
        if: ${{ needs.classify-pr.outputs.packages != 'true' }}
        run: echo "No package artifact validation required for this change set."

      - name: Checkout
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Validate package metadata
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        run: pnpm validate:packages

      - name: Scan package artifacts
        if: ${{ needs.classify-pr.outputs.packages == 'true' }}
        run: pnpm scan:packages

  validate-submission-gate:
    name: validate-submission-gate
    needs: classify-pr
    if: ${{ needs.classify-pr.outputs.submission_gate == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: pr-validate-submission-gate-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test private submission gate helpers
        run: pnpm exec vitest run tests/submission-gate-worker.test.ts

      - name: Dry-run submission gate Worker and Container
        run: pnpm submission-gate:dry-run

  validate-pr-preview:
    name: validate-pr-preview
    # Skip on content-ONLY PRs: this job does a full preview DEPLOY and waits up to 600s for the URL —
    # a ~10-min runner hog. It has no content-specific path (unlike validate-registry/web), it does NOT
    # gate required-pr-gate, and content go-live is validated at deploy. On content-only PRs it just
    # starves the (throttled) runner pool, delaying the cheap required-pr-gate the gate actually waits on,
    # so a 1-line content add sat queued for minutes. (#content-only-skip-preview)
    if: ${{ ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && github.ref_name == 'automation/readme-refresh')) && (needs.classify-pr.outputs.web == 'true' || needs.classify-pr.outputs.registry == 'true' || needs.classify-pr.outputs.mcp == 'true') && needs.classify-pr.outputs.source_content_only != 'true' }}
    needs: classify-pr
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      # Per-ref (not repo-wide) so PRs don't cancel each other's preview job —
      # under heavy content traffic the old repo-wide slot starved this job and
      # surfaced as gate failures. cancel-in-progress matches the other lanes.
      group: deployment-artifacts-pr-preview-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve PR preview URL
        id: preview-url
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/resolve-pr-preview-url.mjs --wait-seconds 600 --poll-seconds 15 --allow-missing

      - name: Validate deployed artifact contract
        if: ${{ steps.preview-url.outputs.base-url != '' }}
        run: |
          deadline=$((SECONDS + 600))
          until pnpm validate:deployment-artifacts -- --base-url "${{ steps.preview-url.outputs.base-url }}"; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Deployed preview did not satisfy the artifact contract before timeout."
              exit 1
            fi
            echo "Preview artifact contract not ready yet. Waiting 15s..."
            sleep 15
          done

      - name: Validate deployed MCP endpoint contract
        if: ${{ steps.preview-url.outputs.base-url != '' }}
        env:
          MCP_ENDPOINT_URL: ${{ steps.preview-url.outputs.base-url }}/api/mcp
        run: |
          deadline=$((SECONDS + 600))
          until pnpm validate:mcp-endpoint; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Deployed preview MCP endpoint did not satisfy the endpoint contract before timeout."
              exit 1
            fi
            echo "Preview MCP endpoint contract not ready yet. Waiting 15s..."
            sleep 15
          done

  required-pr-gate:
    name: required-pr-gate
    needs:
      - classify-pr
      - validate-worktree
      - validate-ci
      - validate-content
      - validate-content-policy
      - validate-submission-source
      - validate-registry
      - validate-web
      - validate-mcp
      - validate-raycast
      - validate-packages
      - validate-submission-gate
      - validate-pr-preview
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pr-required-gate-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Summarize required PR validation
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON || "{}");
          const rows = Object.entries(needs);

          console.log("Required PR validation results:");
          for (const [name, info] of rows) {
            console.log(`- ${name}: ${info.result || "unknown"}`);
          }

          const failed = rows.filter(([, info]) => {
            const result = info.result || "unknown";
            return !["success", "skipped"].includes(result);
          });

          if (failed.length > 0) {
            console.error("Required PR validation failed:");
            for (const [name, info] of failed) {
              console.error(`- ${name}: ${info.result || "unknown"}`);
            }
            process.exit(1);
          }
          NODE
