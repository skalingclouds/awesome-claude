name: Publish MCP Package

# checkov:skip=CKV_GHA_7: The only workflow_dispatch input is an internal boolean (released_by_release_please) that release-please sets so this run skips re-tagging a release it already created. It does not influence build output; the job is main-only and npm-production environment-gated.

on:
  # release-please dispatches this workflow after it merges a Release PR and creates
  # the mcp-v<semver> tag + GitHub Release, passing released_by_release_please=true so
  # this run skips re-tagging. A bare manual dispatch is the override and self-tags.
  workflow_dispatch:
    inputs:
      released_by_release_please:
        description: "Internal: set by release-please's dispatch so this run skips the tag/release it already created."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-mcp-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: mcp-package-release
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate release version
        id: release
        env:
          RELEASE_PLEASE_TRIGGERED: ${{ inputs.released_by_release_please }}
        run: bash scripts/validate-mcp-release.sh

      - name: Build registry artifacts
        run: pnpm --filter web run prebuild

      - name: Test MCP package
        run: pnpm test:mcp

      - name: Validate production MCP endpoint
        env:
          MCP_ENDPOINT_REQUIRE_SAFETY_METADATA: "1"
        run: pnpm validate:mcp-endpoint -- --url https://heyclau.de/api/mcp --strict-tools

      - name: Dry-run MCP package tarball
        run: pnpm --filter @heyclaude/mcp pack --dry-run --json

      - name: Validate packed MCP package
        env:
          MCP_PACKAGE_REMOTE_SMOKE_URL: https://heyclau.de/api/mcp
          MCP_PACKAGE_REQUIRE_SAFETY_METADATA: "1"
        run: pnpm validate:mcp-package

  publish-mcp-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-mcp-npm
    environment: npm-production
    permissions:
      contents: write
      id-token: write
      actions: write
    concurrency:
      group: mcp-package-release
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        id: release
        env:
          RELEASE_PLEASE_TRIGGERED: ${{ inputs.released_by_release_please }}
        run: bash scripts/validate-mcp-release.sh

      - name: Publish to npm
        working-directory: packages/mcp
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --access public --provenance --ignore-scripts

      # Only on a bare manual override. When release-please dispatched this run
      # (released_by_release_please=true) it already created the tag + GitHub Release,
      # so re-creating them here would conflict.
      - name: Create MCP release tag
        if: ${{ inputs.released_by_release_please != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "@heyclaude/mcp v$RELEASE_VERSION"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          gh auth setup-git
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        if: ${{ inputs.released_by_release_please != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          {
            printf "## Summary\n\n"
            printf -- "- Published \`@heyclaude/mcp@%s\` to npm with provenance.\n" "$RELEASE_VERSION"
            printf -- "- Release tag: \`%s\`\n" "$RELEASE_TAG"
            printf -- "- npm package: https://www.npmjs.com/package/@heyclaude/mcp/v/%s\n\n" "$RELEASE_VERSION"
            printf "## Validation\n\n"
            printf -- "- \`pnpm test:mcp\`\n"
            printf -- "- \`MCP_ENDPOINT_REQUIRE_SAFETY_METADATA=1 pnpm validate:mcp-endpoint -- --url https://heyclau.de/api/mcp --strict-tools\`\n"
            printf -- "- \`pnpm --filter @heyclaude/mcp pack --dry-run --json\`\n"
            printf -- "- \`MCP_PACKAGE_REQUIRE_SAFETY_METADATA=1 MCP_PACKAGE_REMOTE_SMOKE_URL=https://heyclau.de/api/mcp pnpm validate:mcp-package\`\n"
          } > "$notes_file"
          gh release create "$RELEASE_TAG" \
            --title "@heyclaude/mcp v$RELEASE_VERSION" \
            --notes-file "$notes_file"

      # After a successful npm publish, republish the MCP Registry listing and
      # the Smithery listing so both reflect the new version and live tool set.
      # The registry uses server.json (version bumped by release-please's
      # extra-files config); Smithery re-scans the live HTTP server at
      # https://heyclau.de/api/mcp. Run sequentially: registry first (npm-
      # ownership validation must see the newly published package), then Smithery.
      - name: Dispatch MCP Registry publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-mcp-registry.yml --ref main

      - name: Dispatch Smithery publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run smithery-publish.yml --ref main
