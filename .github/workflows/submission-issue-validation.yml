name: Submission Issue Validation

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-submission:
    if: >-
      contains(github.event.issue.labels.*.name, 'content-submission') ||
      startsWith(github.event.issue.title, 'Submit') ||
      startsWith(github.event.issue.title, '[Submit]') ||
      contains(github.event.issue.body, '### Category') ||
      contains(github.event.issue.body, '**Category:**') ||
      contains(github.event.issue.body, 'Category:') ||
      contains(github.event.issue.body, 'Content Type:')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: submission-issue-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write issue payload
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(
              ".github/tmp/issue.json",
              JSON.stringify(context.payload.issue, null, 2),
              "utf8"
            );

      - name: Write contributor payload
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const login = context.payload.issue.user?.login;
            if (!login) return;
            const { data: user } = await github.rest.users.getByUsername({
              username: login
            });
            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(
              ".github/tmp/contributor.json",
              JSON.stringify(user, null, 2),
              "utf8"
            );

      - name: Validate submission issue
        id: validate
        continue-on-error: true
        run: |
          node scripts/validate-submission-issue.mjs \
            --issue-json .github/tmp/issue.json \
            --output .github/tmp/submission-validation.json

      - name: Ensure validation report exists
        if: always()
        run: |
          test -f .github/tmp/submission-validation.json

      - name: Analyze submission risk
        if: always()
        run: |
          node scripts/analyze-submission-risk.mjs \
            --issue-json .github/tmp/issue.json \
            --validation-json .github/tmp/submission-validation.json \
            --contributor-json .github/tmp/contributor.json \
            --output .github/tmp/submission-risk.json \
            --markdown-output .github/tmp/submission-risk.md

      - name: Precheck auto-import eligibility
        id: auto_import_precheck
        if: always()
        run: |
          node scripts/ci/check-auto-import-eligibility.mjs \
            --issue-json .github/tmp/issue.json \
            --validation-json .github/tmp/submission-validation.json \
            --risk-json .github/tmp/submission-risk.json \
            --output .github/tmp/auto-import-precheck.json

      - name: Auto-label submission issue
        if: ${{ always() && steps.auto_import_precheck.outputs.eligible != 'true' }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const reportPath = ".github/tmp/submission-validation.json";
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));

            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: context.issue.number
            });
            const managedValidationLabels = new Set([
              "needs-author-input",
              "source-needs-verification",
              "stale-submission"
            ]);
            const currentLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const labels = new Set(
              currentLabels.filter((label) => !managedValidationLabels.has(label))
            );
            for (const label of report.recommendedLabels || []) {
              if (label) labels.add(label);
            }
            const nextLabels = [...labels].filter(Boolean);
            try {
              await github.rest.issues.setLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: nextLabels
              });
            } catch (error) {
              core.warning(`Could not apply submission labels: ${error.message}`);
            }

      - name: Auto-label submission risk
        if: ${{ always() && steps.auto_import_precheck.outputs.eligible != 'true' }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const reportPath = ".github/tmp/submission-risk.json";
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const definitions = report.labelDefinitions || {};
            for (const [name, definition] of Object.entries(definitions)) {
              try {
                await github.rest.issues.updateLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              }
            }

            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: context.issue.number
            });
            const riskLabels = new Set(Object.keys(definitions));
            const currentLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const labels = new Set(
              currentLabels.filter((label) => !riskLabels.has(label))
            );
            for (const label of report.recommendedLabels || []) {
              if (label) labels.add(label);
            }
            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels: [...labels].filter(Boolean)
            });

      - name: Preview import output
        if: always()
        run: |
          node - <<'NODE'
          const { spawnSync } = require("node:child_process");
          const fs = require("node:fs");
          const reportPath = ".github/tmp/submission-validation.json";
          if (!fs.existsSync(reportPath)) process.exit(0);
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          if (!report.ok || report.skipped) process.exit(0);
          const result = spawnSync(
            process.execPath,
            [
              "scripts/import-submission-issue.mjs",
              "--issue-json",
              ".github/tmp/issue.json",
              "--dry-run"
            ],
            { encoding: "utf8" }
          );
          if (result.status !== 0) {
            fs.writeFileSync(
              ".github/tmp/submission-import-preview.md",
              `Import preview failed:\n\n${result.stderr || result.stdout}`,
              "utf8"
            );
            process.exit(0);
          }
          fs.writeFileSync(".github/tmp/submission-import-preview.md", result.stdout, "utf8");
          NODE

      - name: Post validation report comment
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const reportPath = ".github/tmp/submission-validation.json";
            if (!fs.existsSync(reportPath)) return;

            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));

            const marker = "<!-- submission-validation-report -->";
            const heading = report.skipped
              ? "## Submission validation: needs more detail"
              : report.ok
                ? "## Submission validation: passed"
                : "## Submission validation: failed";

            const lines = [
              marker,
              heading,
              "",
              `- Category: \`${report.category || "unknown"}\``,
              report.errors?.length ? `- Errors: ${report.errors.length}` : "- Errors: 0",
              report.warnings?.length ? `- Warnings: ${report.warnings.length}` : "- Warnings: 0"
            ];

            if (report.errors?.length) {
              lines.push("", "### Errors");
              for (const error of report.errors) lines.push(`- ${error}`);
            }

            if (report.warnings?.length) {
              lines.push("", "### Warnings");
              for (const warning of report.warnings) lines.push(`- ${warning}`);
            }

            if (report.skipped) {
              lines.push(
                "",
                "### Next steps",
                "- This looks like a submission, but it did not resolve to a supported category/schema.",
                "- Please update the issue with the category-specific form fields or resubmit through the matching submission form."
              );
            }

            const previewPath = ".github/tmp/submission-import-preview.md";
            if (fs.existsSync(previewPath)) {
              const preview = fs.readFileSync(previewPath, "utf8").trim();
              const [firstLine, ...rest] = preview.split("\n");
              const importPath = firstLine?.replace(/^Would write\s+/, "").trim();
              if (importPath) {
                lines.push("", "### Import preview", `- Output path: \`${importPath}\``);
              } else {
                lines.push("", "### Import preview");
              }
              const mdxPreview = rest.join("\n").trim();
              if (mdxPreview) {
                const capped = mdxPreview.split("\n").slice(0, 120).join("\n");
                lines.push("", "<details><summary>Dry-run MDX preview</summary>", "", "```mdx", capped, "```", "</details>");
              }
            }

            const body = lines.join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Post risk report comment
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const reportPath = ".github/tmp/submission-risk.md";
            if (!fs.existsSync(reportPath)) return;
            const body = fs.readFileSync(reportPath, "utf8");
            const marker = "<!-- submission-risk-report -->";
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail when submission risk is critical
        if: always()
        run: |
          node scripts/ci/fail-critical-risk-report.mjs .github/tmp/submission-risk.json

      - name: Check auto-import eligibility
        id: auto_import
        if: ${{ !failure() && !cancelled() }}
        run: |
          node scripts/ci/check-auto-import-eligibility.mjs \
            --issue-json .github/tmp/issue.json \
            --validation-json .github/tmp/submission-validation.json \
            --risk-json .github/tmp/submission-risk.json \
            --output .github/tmp/auto-import-eligibility.json

      - name: Import auto-eligible submission
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        env:
          SUBMISSION_REVIEWED_BY: auto-import-gates
          SUBMISSION_REVIEWED_AT: ${{ github.event.issue.updated_at }}
        run: |
          node scripts/import-submission-issue.mjs \
            --issue-json .github/tmp/issue.json

      - name: Format auto-imported content
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        run: |
          changed_mdx="$(git diff --name-only --diff-filter=ACM | grep -E '^content/.+\.mdx$' || true)"
          if [ -n "$changed_mdx" ]; then
            printf '%s\n' "$changed_mdx" | xargs pnpm exec prettier --write
          fi

      - name: Build auto-import registry artifacts
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        run: pnpm --filter web run prebuild

      - name: Refresh auto-import README
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        run: pnpm generate:readme

      - name: Validate auto-imported content
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        run: |
          pnpm validate:content:strict
          pnpm validate:issue-templates
          pnpm validate:packages
          pnpm scan:packages
          pnpm validate:raycast-feed
          pnpm test:submission-intake
          pnpm test:registry-artifacts
          pnpm test:seo-jsonld

      - name: Build auto-import PR metadata
        id: auto_metadata
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const outputPath = process.env.GITHUB_OUTPUT;
          function setOutput(name, value) {
            if (!/^[A-Za-z_][A-Za-z0-9_]*$/.test(name)) {
              throw new Error(`Unsafe GitHub Actions output name: ${name}`);
            }
            const normalized = String(value ?? "").replace(/[\r\n]/g, " ");
            fs.appendFileSync(outputPath, `${name}=${normalized}\n`);
          }
          const issue = JSON.parse(fs.readFileSync(".github/tmp/issue.json", "utf8"));
          const report = JSON.parse(fs.readFileSync(".github/tmp/submission-validation.json", "utf8"));
          const category = report.category || "content";
          const slug = report.fields?.slug || `issue-${issue.number}`;
          const title = report.fields?.name || slug;
          const issueAuthor = issue.user?.login || "";
          const issueAuthorId = issue.user?.id || "";
          const issueAuthorHandle = issueAuthor ? `@${issueAuthor}` : "unknown submitter";
          const issueUrl = issue.html_url || issue.url || "";
          setOutput("issue_number", issue.number);
          setOutput("issue_author", issueAuthor);
          setOutput("issue_author_handle", issueAuthorHandle);
          setOutput("issue_author_id", issueAuthorId);
          setOutput("issue_url", issueUrl);
          setOutput("category", category);
          setOutput("slug", slug);
          setOutput("entry_title", title);
          setOutput("branch", `automation/submission-${issue.number}-${slug}`);
          setOutput("commit_title", `feat(content): add ${category} ${slug}`);
          setOutput("pr_title", `feat(content): add ${category} ${slug}`);
          NODE

      - name: Create auto-import PR
        id: auto_cpr
        if: ${{ !failure() && !cancelled() && steps.auto_import.outputs.eligible == 'true' }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          branch: ${{ steps.auto_metadata.outputs.branch }}
          title: ${{ steps.auto_metadata.outputs.pr_title }}
          commit-message: |
            ${{ steps.auto_metadata.outputs.commit_title }}

            Co-authored-by: ${{ steps.auto_metadata.outputs.issue_author }} <${{ steps.auto_metadata.outputs.issue_author_id }}+${{ steps.auto_metadata.outputs.issue_author }}@users.noreply.github.com>
          delete-branch: true
          add-paths: |
            content/**
            apps/web/public/data/**
            apps/web/src/generated/**
            README.md
          body: |
            ## Summary
            - Auto-imports gated submission #${{ steps.auto_metadata.outputs.issue_number }} by ${{ steps.auto_metadata.outputs.issue_author_handle }} for `${{ steps.auto_metadata.outputs.category }}/${{ steps.auto_metadata.outputs.slug }}`

            ## What changed
            - Added the content file from a schema-valid, source-backed submission
            - Regenerated registry artifacts and README output
            - Preserved issue-first review and original submitter attribution before publication

            ## Why
            - The issue passed the auto-import eligibility gates. This opens a reviewable PR only; it does not auto-merge or publish the entry.

            ## Validation
            - `pnpm validate:content:strict`
            - `pnpm validate:issue-templates`
            - `pnpm validate:packages`
            - `pnpm scan:packages`
            - `pnpm validate:raycast-feed`
            - `pnpm test:submission-intake`
            - `pnpm test:registry-artifacts`
            - `pnpm test:seo-jsonld`

            ## Notes
            - Original submitter: ${{ steps.auto_metadata.outputs.issue_author_handle }} via #${{ steps.auto_metadata.outputs.issue_number }}
            - Maintainer review still gates merge.
            - Closes #${{ steps.auto_metadata.outputs.issue_number }} after merge.

      - name: Trigger content validation for auto-import PR
        if: ${{ !failure() && !cancelled() && steps.auto_cpr.outputs.pull-request-url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_REF: ${{ steps.auto_metadata.outputs.branch }}
        run: gh workflow run content-validation.yml --ref "$VALIDATION_REF"

      - name: Link auto-import PR on submission issue
        if: ${{ !failure() && !cancelled() && steps.auto_cpr.outputs.pull-request-url != '' }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: Number("${{ steps.auto_metadata.outputs.issue_number }}"),
              labels: ["import-pr-open"]
            });
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: Number("${{ steps.auto_metadata.outputs.issue_number }}"),
              body: `Auto-import PR opened after eligibility gates passed for ${{ steps.auto_metadata.outputs.issue_author_handle }}: ${{ steps.auto_cpr.outputs.pull-request-url }}`
            });

      - name: Summarize invalid submission issue
        if: always()
        run: |
          node scripts/ci/fail-invalid-submission-report.mjs --informational
