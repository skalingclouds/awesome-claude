name: README Refresh PR

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/generate-readme.mjs"
      - "scripts/build-readme-refresh-body.mjs"
      - ".github/workflows/readme-refresh-pr.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  refresh-readme:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'docs(readme):') }}
    runs-on: ubuntu-latest
    concurrency:
      # Serialize all runs because each writes the shared automation/readme-refresh branch.
      group: refresh-readme-automation-readme-refresh
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate README
        run: pnpm generate:readme

      - name: Build README refresh body
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/build-readme-refresh-body.mjs --output "$RUNNER_TEMP/readme-refresh-body.md"

      - name: Publish README refresh branch
        id: refresh_branch
        env:
          BRANCH_NAME: automation/readme-refresh
        run: |
          git fetch origin main
          if git diff --quiet origin/main -- README.md; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp README.md "$RUNNER_TEMP/README.md"
          git fetch origin "refs/heads/$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git switch -C "$BRANCH_NAME" origin/main
          cp "$RUNNER_TEMP/README.md" README.md

          unexpected_files="$(git diff --name-only -- . ':!README.md')"
          if [[ -n "$unexpected_files" ]]; then
            echo "::error::README refresh branch has non-README changes:"
            printf '%s\n' "$unexpected_files"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): refresh generated catalog index"

          remote_branch_sha="$(git ls-remote --heads origin "$BRANCH_NAME" | awk '{print $1}')"
          if [[ -n "$remote_branch_sha" ]]; then
            git push --force-with-lease="refs/heads/$BRANCH_NAME:$remote_branch_sha" origin "$BRANCH_NAME:$BRANCH_NAME"
          else
            git push --force-with-lease="refs/heads/$BRANCH_NAME:" origin "$BRANCH_NAME:$BRANCH_NAME"
          fi
          echo "has-changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update README refresh PR
        id: readme_pr
        if: ${{ steps.refresh_branch.outputs.has-changes == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/readme-refresh
        run: |
          pr_number="$(gh pr list --head "$BRANCH_NAME" --base main --state open --json number --jq '.[0].number // ""')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" \
              --title "docs(readme): refresh generated catalog index" \
              --body-file "$RUNNER_TEMP/readme-refresh-body.md" \
              --add-label docs \
              --add-label automation
            pr_url="$(gh pr view "$pr_number" --json url --jq .url)"
          else
            pr_url="$(gh pr create \
              --title "docs(readme): refresh generated catalog index" \
              --body-file "$RUNNER_TEMP/readme-refresh-body.md" \
              --base main \
              --head "$BRANCH_NAME" \
              --label docs \
              --label automation)"
          fi
          echo "pull-request-url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Trigger content validation for README PR
        if: ${{ steps.readme_pr.outputs.pull-request-url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_REF: automation/readme-refresh
        run: gh workflow run content-validation.yml --ref "$VALIDATION_REF"
