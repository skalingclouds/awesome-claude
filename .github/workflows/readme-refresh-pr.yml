name: README Refresh PR

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/generate-readme.mjs"
      - "scripts/build-readme-refresh-body.mjs"
      - ".github/workflows/readme-refresh-pr.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-readme:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'docs(readme):') }}
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-readme-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate README
        run: pnpm generate:readme

      - name: Build README refresh body
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/build-readme-refresh-body.mjs --output "$RUNNER_TEMP/readme-refresh-body.md"

      - name: Create README update PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          branch: automation/readme-refresh
          title: "docs(readme): refresh generated catalog index"
          commit-message: "docs(readme): refresh generated catalog index"
          body-path: ${{ runner.temp }}/readme-refresh-body.md
          labels: |
            docs
            automation
          add-paths: |
            README.md
