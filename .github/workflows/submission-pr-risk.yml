name: Submission PR Risk Review

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    paths:
      - "content/**"
      - ".github/workflows/submission-pr-risk.yml"
      - "packages/registry/src/submission-risk.js"
      - "scripts/analyze-submission-risk.mjs"
      - "scripts/ci/fail-critical-risk-report.mjs"
      - "scripts/ci/fail-provenance-report.mjs"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  analyze-submission-pr-risk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: submission-pr-risk-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout base repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write PR risk input
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const pr = context.payload.pull_request;
            const repositoryFullName = context.payload.repository.full_name;
            const headRepositoryFullName = pr.head?.repo?.full_name || "";
            const headRef = pr.head?.ref || "";
            const isSameRepository = headRepositoryFullName === repositoryFullName;
            const sourceType =
              isSameRepository && /^automation\/submission-\d+-/.test(headRef)
                ? "automation_import"
                : isSameRepository
                  ? "same_repo_direct"
                  : "external_direct";
            const frontmatterValue = (value) => {
              const trimmed = String(value || "").trim();
              if (!trimmed) return "";
              if (
                (trimmed.startsWith("\"") && trimmed.endsWith("\"")) ||
                (trimmed.startsWith("'") && trimmed.endsWith("'"))
              ) {
                return trimmed.slice(1, -1);
              }
              return trimmed;
            };
            const normalizeGitHubLogin = (value) => {
              const text = String(value || "").trim();
              if (!text) return "";
              try {
                const url = new URL(text);
                if (url.protocol === "https:" && url.hostname === "github.com") {
                  return url.pathname.split("/").filter(Boolean)[0] || "";
                }
              } catch {}
              return text.replace(/^@+/, "").trim();
            };
            const readFrontmatter = (content) => {
              const lines = String(content || "").split(/\r?\n/);
              if (lines[0]?.trim() !== "---") return {};
              const data = {};
              for (const line of lines.slice(1)) {
                if (line.trim() === "---") break;
                const match = /^([A-Za-z0-9_]+):\s*(.*)$/.exec(line);
                if (match) data[match[1]] = frontmatterValue(match[2]);
              }
              return data;
            };
            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const contentFiles = [];
            const submissionIssueNumbers = new Set();
            const submittedByHandles = new Set();
            for (const file of files) {
              const isContentMdx = /^content\/[^/]+\/[^/]+\.mdx$/i.test(file.filename);
              if (!isContentMdx || file.status === "removed") {
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions
                });
                continue;
              }
              if (!pr.head?.repo || !pr.head?.sha) {
                core.warning(`Could not read ${file.filename}: pull request head metadata is unavailable.`);
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content: ""
                });
                continue;
              }
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: pr.head.repo.owner.login,
                  repo: pr.head.repo.name,
                  path: file.filename,
                  ref: pr.head.sha
                });
                const content = data.content
                  ? Buffer.from(data.content, "base64").toString("utf8")
                  : "";
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content
                });
                const frontmatter = readFrontmatter(content);
                const issueNumber = Number(frontmatter.submissionIssueNumber);
                if (Number.isInteger(issueNumber) && issueNumber > 0) {
                  submissionIssueNumbers.add(issueNumber);
                }
                const submittedBy = normalizeGitHubLogin(frontmatter.submittedBy);
                if (submittedBy) submittedByHandles.add(submittedBy);
              } catch (error) {
                core.warning(`Could not read ${file.filename}: ${error.message}`);
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content: ""
                });
              }
            }
            const { data: pullRequestActor } = await github.rest.users.getByUsername({
              username: pr.user.login
            });
            const frontmatterContributors = [];
            for (const login of [...submittedByHandles].sort()) {
              try {
                const { data: contributor } = await github.rest.users.getByUsername({
                  username: login
                });
                frontmatterContributors.push(contributor);
              } catch (error) {
                core.warning(`Could not resolve submittedBy @${login}: ${error.message}`);
                frontmatterContributors.push({ login, error: error.message });
              }
            }
            const submissionIssueContributors = [];
            for (const issueNumber of [...submissionIssueNumbers].sort((a, b) => a - b)) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  ...context.repo,
                  issue_number: issueNumber
                });
                let contributor = null;
                if (issue.user?.login) {
                  const response = await github.rest.users.getByUsername({
                    username: issue.user.login
                  });
                  contributor = response.data;
                }
                submissionIssueContributors.push({
                  issueNumber,
                  issue,
                  contributor
                });
              } catch (error) {
                core.warning(`Could not resolve submission issue #${issueNumber}: ${error.message}`);
                submissionIssueContributors.push({
                  issueNumber,
                  issue: null,
                  contributor: null,
                  error: error.message
                });
              }
            }
            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(
              ".github/tmp/pr-risk-input.json",
              JSON.stringify({
                pullRequest: pr,
                pullRequestActor,
                contributor: pullRequestActor,
                frontmatterContributors,
                sourceType,
                repositoryFullName,
                submissionIssueContributors,
                files: contentFiles
              }, null, 2),
              "utf8"
            );

      - name: Analyze direct content PR risk
        run: |
          node scripts/analyze-submission-risk.mjs \
            --pr-json .github/tmp/pr-risk-input.json \
            --output .github/tmp/submission-risk.json \
            --markdown-output .github/tmp/submission-risk.md

      - name: Label PR risk
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const report = JSON.parse(
              fs.readFileSync(".github/tmp/submission-risk.json", "utf8")
            );
            const definitions = report.labelDefinitions || {};
            for (const [name, definition] of Object.entries(definitions)) {
              try {
                await github.rest.issues.updateLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              }
            }
            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: context.payload.pull_request.number
            });
            const riskLabels = new Set(Object.keys(definitions));
            const currentLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const labels = new Set(
              currentLabels.filter((label) => !riskLabels.has(label))
            );
            for (const label of report.recommendedLabels || []) {
              if (label) labels.add(label);
            }
            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              labels: [...labels].filter(Boolean)
            });

      - name: Post PR risk report
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const body = fs.readFileSync(".github/tmp/submission-risk.md", "utf8");
            const marker = "<!-- submission-risk-report -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Fail when submission provenance is invalid
        run: node scripts/ci/fail-provenance-report.mjs .github/tmp/submission-risk.json

      - name: Fail when submission risk is critical
        run: node scripts/ci/fail-critical-risk-report.mjs .github/tmp/submission-risk.json
