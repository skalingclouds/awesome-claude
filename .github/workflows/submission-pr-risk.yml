                }
                return {
                  contributor,
                  source,
                  fallback: prUser || {}
                };
              }
              if (report.effectiveContributor) {
                return {
                  contributor: report.effectiveContributor,
                  source: report.contributorSource,
                  fallback: prUser || {}
                };
              }
              return {
                contributor: {},
                source: report.contributorSource,
                fallback: prUser || {}
              };
            };
            const formatRiskMarkdown = (report) => {
              const lines = [
                RISK_COMMENT_MARKER,
                `## Submission security/safety review: ${report.riskTier}`,
                "",
                `- Recommended action: \`${report.recommendedAction}\``,
                `- Recommended labels: ${
                  report.recommendedLabels.map((label) => `\`${label}\``).join(", ") ||
                  "none"
                }`
              ];
              if (
                report.provenanceStatus &&
                report.provenanceStatus !== "not_applicable"
              ) {
                lines.push("", "### Provenance");
                lines.push(`- Status: \`${report.provenanceStatus}\``);
                if (
                  report.pullRequestActor?.login &&
                  !sameGitHubLogin(
                    report.pullRequestActor.login,
                    report.effectiveContributor?.login
                  )
                ) {
                  lines.push(
                    `- PR opened by: ${githubUserReference(
                      report.pullRequestActor.login
                    )}`
                  );
                }
                for (const provenance of report.contentProvenance || []) {
                  const parts = [];
                  if (provenance.submittedBy) {
                    parts.push(`by ${githubUserReference(provenance.submittedBy)}`);
                  }
                  if (provenance.submissionIssueNumber) {
                    parts.push(`via issue #${provenance.submissionIssueNumber}`);
                  } else if (provenance.importPrNumber) {
                    parts.push(`via PR #${provenance.importPrNumber}`);
                  }
                  if (parts.length) {
                    lines.push(
                      `- ${markdownCodeSpan(provenance.filename)}: ${parts.join(" ")}`
                    );
                  }
                }
                for (const finding of report.provenanceFindings || []) {
                  lines.push(
                    `- \`${finding.severity}\` ${escapeMarkdownText(
                      finding.summary
                    )} (\`${finding.id}\`)${markdownDetail(finding.detail)}`
                  );
                }
              }
              const contributor = report.contributorAnalysis || baseContributorAnalysis();
              if (
                contributor.login ||
                contributor.rawLogin ||
                contributor.warnings?.length
              ) {
                lines.push("", "### Contributor");
                const analyzed = contributor.login
                  ? githubUserReference(contributor.login)
                  : markdownCodeSpan(contributor.rawLogin);
                if (analyzed) lines.push(`- Contributor analyzed: ${analyzed}`);
                if (contributor.source) lines.push(`- Source: \`${contributor.source}\``);
                lines.push(`- Resolution: \`${contributor.resolutionStatus}\``);
                if (contributor.accountType) {
                  lines.push(`- Account type: \`${contributor.accountType}\``);
                }
                if (contributor.profileUrl) {
                  lines.push(`- Profile: ${markdownCodeSpan(contributor.profileUrl)}`);
                }
                if (contributor.accountAgeDays !== null) {
                  lines.push(`- Account age: ${contributor.accountAgeDays} days`);
                }
                if (contributor.publicRepos !== null) {
                  lines.push(`- Public repos: ${contributor.publicRepos}`);
                }
                if (contributor.reviewSignals?.length) {
                  lines.push(
                    `- Signals: ${contributor.reviewSignals
                      .map((signal) => `\`${signal}\``)
                      .join(", ")}`
                  );
                }
                for (const warning of contributor.warnings || []) {
                  lines.push(`- Warning: ${escapeMarkdownText(warning)}`);
                }
              }
              const contribution = report.contributionAnalysis || baseContributionAnalysis();
              lines.push("", "### Contribution");
              lines.push(`- Schema: \`${contribution.schemaState}\``);
              lines.push(`- Sources: \`${contribution.sourceState}\``);
              if (contribution.contentFiles?.length) {
                const listedFiles = contribution.contentFiles
                  .slice(0, 8)
                  .map((file) => markdownCodeSpan(file.filename))
                  .join(", ");
                lines.push(`- Content files: ${listedFiles}`);
              }
              if (contribution.sourceUrls?.length) {
                lines.push(`- Source URLs: ${contribution.sourceUrls.length}`);
              }
              if (contribution.githubSourceRepos?.length) {
                const repos = contribution.githubSourceRepos
                  .slice(0, 8)
                  .map((repo) => markdownCodeSpan(repo.fullName))
                  .join(", ");
                lines.push(`- GitHub sources: ${repos}`);
              }
              if (contribution.capabilityRiskBuckets?.length) {
                lines.push(
                  `- Capability buckets: ${contribution.capabilityRiskBuckets
                    .map((bucket) => `\`${bucket}\``)
                    .join(", ")}`
                );
              } else {
                lines.push("- Capability buckets: none");
              }
              lines.push(`- Provenance: \`${contribution.provenanceState}\``);
              lines.push("", "### Review flags");
              if (report.reviewFlags.length) {
                for (const flag of report.reviewFlags) {
                  lines.push(
                    `- \`${flag.severity}\` ${escapeMarkdownText(
                      flag.summary
                    )} (\`${flag.id}\`)${markdownDetail(flag.detail)}`
                  );
                }
              } else {
                lines.push("- No deterministic security/safety flags found.");
              }
              if (report.classificationWarnings.length) {
                lines.push("", "### Classification warnings");
                for (const warning of report.classificationWarnings) {
                  lines.push(
                    `- ${escapeMarkdownText(warning.summary)} (\`${
                      warning.id
                    }\`)${markdownDetail(warning.detail)}`
                  );
                }
              }
              if (report.trustSignals.length) {
                lines.push("", "### Trust signals");
                for (const signal of report.trustSignals.slice(0, 12)) {
                  const formatted = markdownLabelValue(signal);
                  if (formatted) lines.push(`- ${formatted}`);
                }
              }
              const maintainerChecks = [
                ...(contribution.maintainerActionItems || []),
                ...(report.humanReviewNotes || [])
              ].filter(
                (item, index, list) =>
                  normalizeText(item) &&
                  list.findIndex((candidate) => candidate === item) === index
              );
              if (maintainerChecks.length) {
                lines.push("", "### Maintainer checks");
                for (const note of maintainerChecks) {
                  lines.push(`- ${escapeMarkdownText(note)}`);
                }
              }
              return `${lines.join("\n")}\n`;
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const contentFiles = [];
            const submissionIssueNumbers = new Set();
            const submittedByHandles = new Set();
            for (const file of files) {
              const isContentMdx = /^content\/[^/]+\/[^/]+\.mdx$/i.test(file.filename);
              if (!isContentMdx || file.status === "removed") {
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions
                });
                continue;
              }
              if (!pr.head?.repo || !pr.head?.sha) {
                core.warning(`Could not read ${file.filename}: pull request head metadata is unavailable.`);
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content: ""
                });
                continue;
              }
              try {
                // The PR head file is read as data only. This privileged workflow
                // never checks out PR code and never runs contributor-controlled files.
                const { data } = await github.rest.repos.getContent({
                  owner: pr.head.repo.owner.login,
                  repo: pr.head.repo.name,
                  path: file.filename,
                  ref: pr.head.sha
                });
                const content = data.content
                  ? Buffer.from(data.content, "base64").toString("utf8")
                  : "";
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content
                });
                const frontmatter = readFrontmatter(content);
                const issueNumber = Number(frontmatter.submissionIssueNumber);
                if (Number.isInteger(issueNumber) && issueNumber > 0) {
                  submissionIssueNumbers.add(issueNumber);
                }
                const submittedBy = normalizeGitHubLogin(frontmatter.submittedBy);
                if (submittedBy) submittedByHandles.add(submittedBy);
              } catch (error) {
                core.warning(`Could not read ${file.filename}: ${error.message}`);
                contentFiles.push({
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  content: ""
                });
              }
            }
            const { data: pullRequestActor } = await github.rest.users.getByUsername({
              username: pr.user.login
            });
            const frontmatterContributors = [];
            for (const login of [...submittedByHandles].sort()) {
              try {
                const { data: contributor } = await github.rest.users.getByUsername({
                  username: login
                });
                frontmatterContributors.push(contributor);
              } catch (error) {
                core.warning(`Could not resolve submittedBy @${login}: ${error.message}`);
                frontmatterContributors.push({ login, error: error.message });
              }
            }
            const submissionIssueContributors = [];
            for (const issueNumber of [...submissionIssueNumbers].sort((a, b) => a - b)) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  ...context.repo,
                  issue_number: issueNumber
                });
                let contributor = null;
                if (issue.user?.login) {
                  const response = await github.rest.users.getByUsername({
                    username: issue.user.login
                  });
                  contributor = response.data;
                }
                submissionIssueContributors.push({
                  issueNumber,
                  issue,
                  contributor
                });
              } catch (error) {
                core.warning(`Could not resolve submission issue #${issueNumber}: ${error.message}`);
                submissionIssueContributors.push({
                  issueNumber,
                  issue: null,
                  contributor: null,
                  error: error.message
                });
              }
            }
            const contentMdxFiles = contentFiles.filter(
              (file) =>
                /^content\/[^/]+\/[^/]+\.mdx$/i.test(normalizeText(file.filename)) &&
                normalizeText(file.status) !== "removed"
            );
            const report = baseReport({
              type: "pull_request",
              number: pr.number,
              title: normalizeText(pr.title),
              url: normalizeText(pr.html_url),
              author: normalizeText(pullRequestActor.login || pr.user?.login),
              sourceType,
              contentFiles: contentMdxFiles.map((file) => file.filename)
            });
            if (!contentMdxFiles.length) {
              addFlag(
                report,
                "low",
                "no_content_mdx_files",
                "No added or modified content MDX files were available for risk analysis"
              );
            }
            const hasRootReadmeChange = contentFiles.some(
              (file) =>
                normalizeText(file.filename).toLowerCase() === "readme.md" &&
                normalizeText(file.status) !== "removed"
            );
            const generatedFiles = contentFiles
              .map((file) => normalizeText(file.filename))
              .filter(
                (filename) =>
                  filename.startsWith("apps/web/public/data/") ||
                  filename.startsWith("apps/web/src/generated/") ||
                  filename.startsWith("apps/web/public/downloads/")
              );
            const packageArtifactFiles = contentFiles
              .map((file) => normalizeText(file.filename))
              .filter(
                (filename) =>
                  /^content\/skills\/.+\.zip$/i.test(filename) ||
                  /^content\/mcp\/.+\.mcpb$/i.test(filename)
              );
            if (
              hasRootReadmeChange &&
              contentMdxFiles.length &&
              sourceType === "external_direct"
            ) {
              addClassificationWarning(
                report,
                "generated_readme_change",
                "README.md changes are not accepted in direct content PRs; maintainer automation regenerates README output",
                "Remove README.md from the contributor PR. CI regenerates it for validation, and the post-merge README Refresh PR owns committed updates."
              );
            }
            if (generatedFiles.length && sourceType === "external_direct") {
              addClassificationWarning(
                report,
                "generated_registry_artifact_change",
                "Generated registry artifacts and public download mirrors are not accepted in direct contributor PRs",
                generatedFiles.slice(0, 10).join(", ")
              );
            }
            if (packageArtifactFiles.length && sourceType === "external_direct") {
              addClassificationWarning(
                report,
                "community_package_artifact_change",
                "Community PRs cannot add or modify HeyClaude-hosted ZIP/MCPB package artifacts",
                packageArtifactFiles.slice(0, 10).join(", ")
              );
            }
            const entries = [];
            for (const file of contentMdxFiles) {
              const content = normalizeText(file.content);
              if (!content) {
                addFlag(
                  report,
                  "medium",
                  "missing_pr_file_content",
                  "PR content file could not be read through the GitHub API",
                  file.filename
                );
                continue;
              }
              const frontmatter = readFrontmatter(content);
              const category = prFileCategory(file.filename);
              const fields = frontmatterFields(frontmatter, category);
              const provenance = frontmatterProvenance(frontmatter);
              entries.push({ filename: file.filename, fields, provenance });
              addContentFileAnalysis(report, {
                filename: file.filename,
                status: normalizeText(file.status),
                category,
                slug: fields.slug,
                sourceUrls: [
                  fields.github_url,
                  fields.docs_url,
                  fields.download_url,
                  fields.website_url
                ].filter(Boolean),
                githubSources: [
                  fields.github_url,
                  fields.docs_url,
                  fields.download_url,
                  fields.website_url
                ]
                  .map(githubRepoFromUrl)
                  .filter(Boolean)
              });
              report.trustSignals.push(`Content file: ${file.filename}`);
              addSourceSignals(report, fields, content);
              addContentRiskSignals(report, fields, content);
              addToolListingClassificationSignals(report, fields, content);
            }
            for (const sourceRepo of [...report.contributionAnalysis.githubSourceRepos]) {
              const [owner, repoName] = sourceRepo.fullName.split("/");
              if (!owner || !repoName) continue;
              try {
                const { data: repoData } = await github.rest.repos.get({
                  owner,
                  repo: repoName
                });
                addGithubSourceRepo(report, repoData);
              } catch (error) {
                core.warning(
                  `Could not enrich GitHub source ${sourceRepo.fullName}: ${error.message}`
                );
              }
            }
            validatePrProvenance(
              report,
              entries,
              pullRequestActor,
              frontmatterContributors,
              submissionIssueContributors
            );
            const analysisTarget = contributorAnalysisTarget(
              report,
              pullRequestActor,
              pr.user || {}
            );
            const analysisContributor = contributorSummary(
              analysisTarget.contributor
            );
            if (
              analysisContributor &&
              (!report.effectiveContributor ||
                sameGitHubLogin(
                  analysisContributor.login,
                  report.effectiveContributor.login
                ))
            ) {
              report.effectiveContributor = analysisContributor;
              report.contributorSource = analysisTarget.source;
            }
            applyContributorAnalysis(
              report,
              analysisTarget.contributor,
              analysisTarget.source,
              analysisTarget.fallback
            );
            finalizeReport(report);
            const markdownReport = formatRiskMarkdown(report);
            core.info(
              `Submission security/safety risk: ${report.riskTier} (${report.reviewFlags.length} flags)`
            );
            const definitions = report.labelDefinitions || {};
            for (const [name, definition] of Object.entries(definitions)) {
              try {
                await github.rest.issues.updateLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                });
              }
            }
            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: context.payload.pull_request.number
            });
            const riskLabels = new Set(Object.keys(definitions));
            const currentLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const labels = new Set(
              currentLabels.filter((label) => !riskLabels.has(label))
            );
            for (const label of report.recommendedLabels || []) {
              if (label) labels.add(label);
            }
            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              labels: [...labels].filter(Boolean)
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.body?.includes(RISK_COMMENT_MARKER)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body: markdownReport
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body: markdownReport
              });
            }
            const failures = [];
            const provenanceBlockers = (report.provenanceFindings || []).filter(
              (finding) => finding.blocking
            );
            if (report.provenanceStatus === "failed" || provenanceBlockers.length) {
              failures.push("Submission provenance validation found blockers:");
              for (const finding of provenanceBlockers) {
                failures.push(`- ${finding.summary} (${finding.id})`);
                if (finding.detail) failures.push(`  ${finding.detail}`);
              }
            }
            if (report.riskTier === "critical") {
              failures.push("Submission security/safety review found critical blockers:");
              for (const flag of report.reviewFlags || []) {
                if (flag.severity === "critical") {
                  failures.push(`- ${flag.summary} (${flag.id})`);
                }
              }
            }
            if (failures.length) {
              core.setFailed(failures.join("\n"));
            }
