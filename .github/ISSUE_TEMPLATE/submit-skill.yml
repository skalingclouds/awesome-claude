name: "Submit Skill"
description: "Submit a skills entry for HeyClaude."
title: "Submit Skill: "
labels:
  - "content-submission"
  - "skills"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for free, maintainer-reviewed skills submissions.
        Products, hosted apps, services, paid listings, sponsorships, claims, and jobs use the dedicated website lead forms.
        Include official source/docs URLs only. Contributor affiliate, referral, tracking, or local package-hosting requests are rejected.
        Do not upload or request public HeyClaude-hosted ZIP/MCPB artifacts for community submissions.
        Do not open a separate README change for issue submissions; imports regenerate the README and registry artifacts automatically.
  - type: input
    id: name
    attributes:
      label: "Name"
      description: "Required."
      placeholder: "Human-readable listing name"
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: "Slug"
      description: "Required."
      placeholder: "kebab-case-slug"
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: "Category"
      description: "Required."
      value: "skills"
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: "GitHub URL"
      description: "Do not use affiliate, referral, or tracking URLs."
      placeholder: "https://github.com/owner/repo"
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: "Docs URL"
      description: "Do not use affiliate, referral, or tracking URLs."
      placeholder: "https://example.com/docs"
    validations:
      required: false
  - type: input
    id: brand_name
    attributes:
      label: "Brand name"
    validations:
      required: false
  - type: input
    id: brand_domain
    attributes:
      label: "Brand domain"
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: "Author"
      placeholder: "GitHub handle, company, or maintainer name"
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: "Public contact"
      description: "Optional public contact. Do not include private contact details."
      placeholder: "@github-handle or email if you want it public"
    validations:
      required: false
  - type: input
    id: tags
    attributes:
      label: "Tags"
      placeholder: "claude, mcp, automation"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Required."
      placeholder: "Explain what this does, why it matters, and when to use it."
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: "Card description"
      description: "Required."
      placeholder: "Short browse-card preview text."
    validations:
      required: true
  - type: textarea
    id: usage_snippet
    attributes:
      label: "Usage snippet"
      description: "Required."
      placeholder: "Show the exact command or config someone should run."
      render: "markdown"
    validations:
      required: true
  - type: dropdown
    id: skill_type
    attributes:
      label: "Skill type"
      description: "Required."
      options:
        - "general"
        - "capability-pack"
    validations:
      required: true
  - type: dropdown
    id: skill_level
    attributes:
      label: "Skill level"
      description: "Required."
      options:
        - "foundational"
        - "advanced"
        - "expert"
    validations:
      required: true
  - type: dropdown
    id: verification_status
    attributes:
      label: "Verification status"
      description: "Required."
      options:
        - "draft"
        - "validated"
        - "production"
    validations:
      required: true
  - type: input
    id: install_command
    attributes:
      label: "Install command"
      placeholder: "npx -y @org/package"
    validations:
      required: false
  - type: input
    id: download_url
    attributes:
      label: "Download URL"
      description: "Do not request local /downloads hosting."
      placeholder: "https://github.com/owner/repo/releases/latest"
    validations:
      required: false
  - type: textarea
    id: full_copyable_content
    attributes:
      label: "Full copyable content"
      placeholder: "Paste the complete usable prompt, config, script, or rule."
      render: "markdown"
    validations:
      required: false
  - type: textarea
    id: retrieval_sources
    attributes:
      label: "Retrieval sources"
      placeholder: "https://example.com/docs\nhttps://github.com/owner/repo"
    validations:
      required: false
  - type: input
    id: tested_platforms
    attributes:
      label: "Tested platforms"
      placeholder: "Claude Code, Claude Desktop, Codex"
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm this is a free content submission, not a paid listing, job, product promotion, or claim request.
          required: true
        - label: I confirm external links are official source/docs links and not affiliate, referral, or tracking URLs.
          required: true
        - label: I understand eligible submissions may auto-open an import PR, but maintainers still review before merge.
          required: true
        - label: I understand imports regenerate the README and registry artifacts automatically.
          required: true
        - label: I understand community ZIP/MCPB artifacts are not published as HeyClaude-hosted downloads.
          required: true
